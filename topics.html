    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0d6efd; /* أزرق تقني */
            --secondary-color: #6f42c1; /* بنفسجي ذكاء اصطناعي */
            --dark-bg: #0f172a; /* خلفية داكنة عصرية */
            --light-bg: #f8fafc;
            --text-dark: #1e293b;
            --text-light: #ffffff;
            --accent-color: #00f2fe; /* لون نيون للتفاعل */
            --whatsapp-color: #25d366; 
            --neon-pink: #ff007f; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--light-bg);
            color: var(--text-dark);
            overflow-x: hidden;
            padding-top: 80px; /* لمراعاة الهيدر الثابت */
        }

        /* --- الهيدر وبار التنقل --- */
        header {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-bottom: 2px solid var(--secondary-color);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
        }

        .logo {
            color: var(--text-light);
            font-size: 22px;
            font-weight: 900;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo img {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid var(--accent-color);
        }

        .logo span {
            color: var(--accent-color);
        }

        .nav-links {
            display: flex;
            gap: 15px;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 700;
            padding: 8px 14px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 15px;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-light);
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
        }

        .btn-login {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: var(--dark-bg) !important;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        @media (max-width: 992px) {
            .nav-container {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 8px;
            }
            .nav-links a {
                padding: 6px 10px;
                font-size: 13px;
            }
            body { padding-top: 130px; }
        }

        /* --- عنوان الصفحة الرئيسي --- */
        .page-title-section {
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1e1b4b 100%);
            color: white;
            text-align: center;
            padding: 40px 20px;
            border-bottom: 3px solid var(--neon-pink);
        }

        .page-title-section h1 {
            font-size: clamp(24px, 4vw, 32px);
            font-weight: 900;
            margin-bottom: 10px;
        }

        .page-title-section h1 span {
            color: var(--accent-color);
        }

        /* --- حاوية العرض المتطورة (Sidebar + Content) --- */
        .interactive-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 30px;
            min-height: 550px;
        }

        /* قائمة أسماء الموضوعات */
        .topics-sidebar {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 620px;
            overflow-y: auto;
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: 900;
            color: var(--dark-bg);
            padding-bottom: 12px;
            border-bottom: 2px dashed #e2e8f0;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topic-list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            color: var(--text-dark);
            transition: all 0.25s ease;
            text-align: right;
        }

        .topic-list-item i {
            font-size: 16px;
            color: #94a3b8;
            transition: color 0.25s;
            width: 20px;
            text-align: center;
        }

        .topic-list-item:hover {
            background: #f1f5f9;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .topic-list-item:hover i {
            color: var(--primary-color);
        }

        /* الحالة النشطة للموضوع المختار */
        .topic-list-item.active {
            background: linear-gradient(45deg, var(--dark-bg), #1e293b);
            color: var(--accent-color);
            border-color: var(--dark-bg);
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
        }

        .topic-list-item.active i {
            color: var(--accent-color);
        }

        /* منطقة عرض المحتوى */
        .content-display-pane {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .display-header {
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1e1b4b 100%);
            padding: 35px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 4px solid var(--secondary-color);
        }

        .display-icon-box {
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--accent-color);
            border: 1px solid rgba(0, 242, 254, 0.25);
        }

        .display-header h2 {
            font-size: clamp(20px, 3vw, 26px);
            font-weight: 900;
        }

        .display-body {
            padding: 40px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            animation: fadeIn 0.4s ease-in-out;
        }

        .display-text {
            color: #334155;
            font-size: 17px;
            line-height: 2;
            text-align: justify;
            margin-bottom: 30px;
        }

        .display-meta {
            border-top: 1px solid #f1f5f9;
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .display-badge {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
            font-size: 13px;
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 50px;
            box-shadow: 0 3px 10px rgba(111, 66, 193, 0.2);
        }

        /* تأثير الحركة عند الانتقال بين الموضوعات */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* التوافق مع الشاشات الصغيرة */
        @media (max-width: 850px) {
            .interactive-container {
                grid-template-columns: 1fr;
            }
            .topics-sidebar {
                max-height: 250px;
            }
            .display-header {
                padding: 25px;
            }
            .display-body {
                padding: 25px;
            }
        }

        /* --- شريط التواصل السريع والفوتر --- */
        .sticky-contact-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sticky-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            color: white;
            text-decoration: none;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .sticky-btn.wa { background-color: var(--whatsapp-color); }
        .sticky-btn.phone { background-color: var(--primary-color); }
        .sticky-btn:hover { transform: scale(1.1); }

        footer {
            background: var(--dark-bg);
            color: #cbd5e1;
            padding: 40px 20px 20px 20px;
            border-top: 4px solid var(--primary-color);
            margin-top: 40px;
        }

        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            text-align: center;

        .footer-whatsapp-display {
            font-size: clamp(18px, 4vw, 22px);
            font-weight: 900;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            background: rgba(255,255,255,0.05);

            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);

        .footer-whatsapp-display:hover {
            color: var(--whatsapp-color);
            border-color: var(--whatsapp-color);
        }

        .social-icons {
            display: flex;
            gap: 15px;
        }

        .social-icons a {
            width: 50px;
            height: 50px;
            background: #1e293b;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 22px;
            transition: all 0.3s;

        .social-icons a.wa-ico:hover { background-color: var(--whatsapp-color); }
        .social-icons a.phone-ico:hover { background-color: var(--primary-color); }

        .footer-credits {
            font-size: 14px;
            border-top: 1px solid #334155;
            width: 100%;
            padding-top: 20px;
            margin-top: 10px;
        }
    </style>
</head>

        // دالة لعرض تفاصيل موضوع محدد في لوحة العرض
        function displayTopicContent(topic) {
            const pane = document.getElementById('contentPane');
            pane.innerHTML = `
                <div class="display-header">
                    <div class="display-icon-box">
                        <i class="fas ${topic.icon}"></i>
                    </div>
                    <div>
                        <h2>${topic.title}</h2>
                    </div>
                </div>
                <div class="display-body">
                    <p class="display-text">${topic.content}</p>
                    <div class="display-meta">
                        <span class="display-badge">${topic.tag}</span>
                        <span style="font-size: 14px; color: #94a3b8; font-weight:700;">منصة دكتور تكنو التعليمية</span>
                    </div>
                </div>
            `;
        }

        // دالة بناء وتوليد القائمة والتحكم بالتفاعل
        function initInteractiveLayout(topics) {
            const sidebar = document.getElementById('sidebarMenu');
            
            // إزالة أي عناصر سابقة عدا العنوان الرئيسي للشريط
            const titleElement = sidebar.querySelector('.sidebar-title');
            sidebar.innerHTML = '';
            sidebar.appendChild(titleElement);

            topics.forEach((topic, index) => {
                const item = document.createElement('div');
                item.className = `topic-list-item ${index === 0 ? 'active' : ''}`;
                item.innerHTML = `<i class="fas ${topic.icon}"></i> ${topic.title}`;
                
                // حدث الضغط على اسم الموضوع
                item.addEventListener('click', () => {
                    // إزالة النشاط من العنصر السابق وتفعيله في العنصر الجديد
                    document.querySelectorAll('.topic-list-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    
                    // عرض المحتوى المخصص للموضوع المختار
                    displayTopicContent(topic);
                    
                    // التمرير التلقائي لأعلى منطقة المحتوى في الشاشات الصغيرة
                    if(window.innerWidth <= 850) {
                        document.getElementById('contentPane').scrollIntoView({ behavior: 'smooth' });
                    }
                });

                sidebar.appendChild(item);
            });

            // عرض الموضوع الأول بشكل افتراضي فور تحميل الصفحة
            if(topics.length > 0) {
                displayTopicContent(topics[0]);
            }
        }

        // تشغيل البناء البرمجي فور تحميل عناصر الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            initInteractiveLayout(initialTopics);
